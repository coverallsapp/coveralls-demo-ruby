name: Test Coverage-Reporter on Multiple Architectures

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build_and_test:
    name: Build and Test on Multiple Architectures
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.7.7
          bundler-cache: true

      - name: Run Tests
        run: bundle exec rspec

      - name: Run test coverage
        run: make test-coverage

      - name: Download Coverage-Reporter (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          curl -sL https://github.com/coverallsapp/coverage-reporter/actions/runs/10950279748/artifacts/1955825111 | tar -xz
          ./coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Coverage-Reporter (aarch64)
        if: matrix.arch == 'aarch64'
        run: |
          curl -sL https://github.com/coverallsapp/coverage-reporter/actions/runs/10950279748/artifacts/1955825116 | tar -xz
          ./coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
